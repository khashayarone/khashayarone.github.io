<section class="section">

    <div class="container">

        <div class="section-header">

            <h1>
                تنظیمات
            </h1>

            <p>
                مدیریت تنظیمات و اطلاعات ذخیره شده
            </p>

        </div>

        <!-- Appearance -->

        <div class="glass-card settings-card">

            <div class="settings-card-header">

                <i data-lucide="palette"></i>

                <h2>
                    ظاهر
                </h2>

            </div>

            <div class="settings-group">

                <label>

                    حالت نمایش

                </label>

                <button
                    id="theme-toggle-settings"
                    class="btn-primary">

                    تغییر تم

                </button>

            </div>

            <div class="settings-group">

                <label>

                    انیمیشن‌ها

                </label>

                <label class="switch">

                    <input
                        type="checkbox"
                        id="animations-toggle">

                    <span class="slider"></span>

                </label>

            </div>

        </div>

        <!-- Credentials -->

        <div class="glass-card settings-card">

            <div class="settings-card-header">

                <i data-lucide="key-round"></i>

                <h2>
                    Credentials
                </h2>

            </div>

            <div class="settings-group">

                <label>

                    GitHub Token

                </label>

                <input
                    id="github-token"
                    type="password"
                    placeholder="ghp_xxxxxxxxxxxxx">

            </div>

            <div class="settings-group">

                <label>

                    Telegram Bot Token

                </label>

                <input
                    id="telegram-token"
                    type="password"
                    placeholder="123456:ABCDEF">

            </div>

            <div class="settings-group">

                <label>

                    Cloudflare Account ID

                </label>

                <input
                    id="cloudflare-account-id"
                    type="text"
                    placeholder="Account ID">

            </div>

        </div>

        <!-- Storage -->

        <div class="glass-card settings-card">

            <div class="settings-card-header">

                <i data-lucide="database"></i>

                <h2>
                    Storage
                </h2>

            </div>

            <div class="settings-actions">

                <button
                    id="export-settings"
                    class="btn-secondary">

                    Export

                </button>

                <button
                    id="import-settings"
                    class="btn-secondary">

                    Import

                </button>

                <button
                    id="reset-settings"
                    class="btn-danger">

                    Reset

                </button>

            </div>

        </div>

    </div>

</section>
