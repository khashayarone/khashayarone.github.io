<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Finder</title>

  <link rel="stylesheet" href="./app.css" />

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <header class="hero">
    <div class="hero-content">
      <h1>VPN Config Finder</h1>
      <p>Live Config Intelligence Engine</p>

      <div id="heroStats" class="hero-stats">
        <div class="stat">
          <span id="totalConfigs">0</span>
          <small>Configs</small>
        </div>
        <div class="stat">
          <span id="totalSources">0</span>
          <small>Sources</small>
        </div>
        <div class="stat">
          <span id="lastUpdate">--</span>
          <small>Updated</small>
        </div>
      </div>
    </div>
  </header>

  <section class="status-bar">
    <span class="pulse"></span>
    <span id="statusText">Loading live network telemetry...</span>
  </section>

  <section class="controls">
    <input id="searchInput" type="search" placeholder="Search protocol, source..." />

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="vless">VLESS</button>
      <button class="filter-btn" data-filter="vmess">VMESS</button>
      <button class="filter-btn" data-filter="trojan">TROJAN</button>
      <button class="filter-btn" data-filter="mtproto">MTProto</button>
    </div>
  </section>

  <main>

    <section>
      <h2>Recommended</h2>
      <div id="recommendedConfigs" class="cards"></div>
    </section>

    <section>
      <h2>Fastest Configs</h2>
      <div id="fastConfigs" class="cards"></div>
    </section>

    <section>
      <h2>Telegram Proxies</h2>
      <div id="telegramConfigs" class="cards"></div>
    </section>

    <section>
      <h2>All Configs</h2>
      <div id="allConfigs" class="cards"></div>
    </section>

    <section>
      <h2>Live Feed</h2>
      <div id="feed"></div>
    </section>

    <section>
      <h2>Source Leaderboard</h2>
      <div id="leaderboard"></div>
    </section>

  </main>

  <div id="qrModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeQr">✕</button>
      <canvas id="qrCanvas"></canvas>
    </div>
  </div>

  <nav class="bottom-bar">
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})">
      <i data-lucide="arrow-up"></i>
    </button>
    <button onclick="location.reload()">
      <i data-lucide="refresh-cw"></i>
    </button>
  </nav>

  <script src="./app.js"></script>
</body>
</html>
