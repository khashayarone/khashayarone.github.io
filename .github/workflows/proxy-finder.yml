name: Proxy Finder — Telegram Channel Scraper

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/proxy-finder.yml'
      - 'scripts/proxy-finder.py'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "⬇️ Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "📦 Install Dependencies"
        run: |
          python -m pip install --upgrade pip --quiet
          pip install requests beautifulsoup4 --quiet

      - name: "🚀 Run Proxy Finder Scraper"
        run: python scripts/proxy-finder.py

      - name: "📊 Commit & Push (with retry)"
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/proxy-finder/
          
          if git diff --staged --quiet; then
            echo "No changes to commit — skipping push"
            exit 0
          fi
          
          git commit -m "🔄 Auto-update proxy list — $(date -u +'%Y-%m-%d %H:%M UTC')"
          
          # Retry push up to 3 times with pull before each retry
          for i in 1 2 3; do
            echo "Push attempt $i/3..."
            
            # Pull latest changes with rebase to avoid merge commits
            git pull --rebase origin main 2>/dev/null || git pull origin main 2>/dev/null || true
            
            if git push origin main 2>&1; then
              echo "✅ Push successful on attempt $i"
              exit 0
            fi
            
            echo "⚠️ Push attempt $i failed — retrying in 5 seconds..."
            sleep 5
          done
          
          echo "❌ Push failed after 3 attempts"
          exit 1
