name: Proxy Intelligence Engine — Core Production V1

on:
  schedule:
    # اجرای منظم هر ۱۵ دقیقه یک‌بار جهت پایش مستمر شبکه
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/proxy-finder.yml'
      - 'scripts/proxy-finder.py'

permissions:
  contents: write

jobs:
  automation-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "⬇️ Checkout Target Repository Node"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Initialize Python Runtime Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "📦 Install Core Network Dependencies"
        run: |
          python -m pip install --upgrade pip --quiet
          pip install requests beautifulsoup4 --quiet

      - name: "🚀 Execute Aggregation Engine Pipeline"
        run: python scripts/proxy-finder.py

      - name: "📊 Secure Database Commit & Distributed Push"
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # استیج کردن هر دو پوشه اصلی لایه داده فرانت‌پروژه
          git add data/proxy-finder/
          git add data/system/
          
          if git diff --staged --quiet; then
            echo "⚡ Core Alert: Matrix data is already up-to-date. Skipping deployment."
            exit 0
          fi
          
          git commit -m "🔄 Telemetry Sync — Live Data Engine Update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          
          # مکانیزم تاخیر و ری‌بیس جهت جلوگیری از تداخل همزمانی جابز گیت‌هاب
          for i in 1 2 3; do
            echo "🌐 Transferring data packets to cloud origin (Attempt $i/3)..."
            git pull --rebase origin main 2>/dev/null || true
            if git push origin main; then
              echo "✅ Cluster Synchronization Successful."
              exit 0
            fi
            echo "⚠️ Collision detected; retrying connection in 5s..."
            sleep 5
          done
          echo "❌ Fatal: Cloud push operation terminated."
          exit 1
