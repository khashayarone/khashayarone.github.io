name: Proxy Finder — Telegram Channel Scraper

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab
  push:
    paths:
      - '.github/workflows/proxy-finder.yml'
      - 'scripts/proxy-finder.py'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 🚀 Run Proxy Finder Scraper
        run: python scripts/proxy-finder.py

      - name: 📊 Commit & Push updated proxy list
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/proxy-finder/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-update proxy list — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
