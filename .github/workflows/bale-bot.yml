name: "🤖 Bale Bot — Connection Handler"

on:
  schedule:
    # Every 30 seconds
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    name: "🤖 Bot Polling"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "📦 Install Dependencies"
        run: |
          pip install requests --quiet

      - name: "🤖 Run Bot"
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
        run: python scripts/bale-bot.py

      - name: "📊 Commit Connection Files"
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/bale-connections/ 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No connection changes"
          else
            git commit -m "🤖 Bale bot: update connections — $(date -u +'%H:%M UTC')"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main 2>/dev/null || true
          fi
