name: "📸 Instagram Downloader"

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "🆔 Unique Request ID"
        required: true
        type: string
      instagram_urls:
        description: "🔗 Instagram URL(s)"
        required: true
        type: string
      content_type:
        description: "📸 Content type"
        required: false
        type: choice
        default: "any"
        options:
          - any
          - post
          - reel
          - story
      bale_code:
        description: "🔑 Bale connection code (optional)"
        required: false
        type: string
        default: ""
      bale_chat_id:
        description: "🆔 Bale chat ID (optional)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  download:
    name: "📸 Instagram Download"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with: { token: "${{ secrets.GITHUB_TOKEN }}", fetch-depth: 1 }

      - name: "⚙️ Git Config"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "📦 Install Dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg curl jq
          pip3 install --upgrade yt-dlp --quiet

      - name: "🔧 Setup"
        run: |
          REQUEST_ID="${{ github.event.inputs.request_id }}"
          IG_URLS="${{ github.event.inputs.instagram_urls }}"
          CONTENT_TYPE="${{ github.event.inputs.content_type }}"
          REQUEST_DIR="data/instagram-downloader/downloads/req_${REQUEST_ID}"
          mkdir -p "$REQUEST_DIR"
          echo "REQUEST_ID=${REQUEST_ID}" >> $GITHUB_ENV
          echo "IG_URLS=${IG_URLS}" >> $GITHUB_ENV
          echo "CONTENT_TYPE=${CONTENT_TYPE}" >> $GITHUB_ENV
          echo "REQUEST_DIR=${REQUEST_DIR}" >> $GITHUB_ENV
          echo "✅ Setup complete"

      - name: "📸 Download"
        run: |
          REQUEST_DIR="${{ env.REQUEST_DIR }}"
          RESULTS="[]"; ERRORS="[]"
          for IG_URL in ${{ env.IG_URLS }}; do
            echo "📸 Downloading: $IG_URL"
            if yt-dlp --no-part --output "${REQUEST_DIR}/%(title)s.%(ext)s" "$IG_URL" 2>&1 | grep -q "100%"; then
              for FILE in "$REQUEST_DIR"/*; do
                [ -f "$FILE" ] || continue
                BASENAME=$(basename "$FILE"); SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
                RESULTS=$(echo "$RESULTS" | jq --arg name "$BASENAME" --argjson size "$SIZE" --arg url "$IG_URL" '. + [{"file_name":$name,"file_size":$size,"url":$url,"status":"completed"}]')
                echo "  ✅ $BASENAME — $SIZE bytes"
              done
            else
              ERRORS=$(echo "$ERRORS" | jq --arg url "$IG_URL" --arg error "Download failed" '. + [{"url":$url,"error":$error}]')
              echo "  ❌ Failed"
            fi
          done
          COMPLETED=$(echo "$RESULTS" | jq '. | length'); FAILED=$(echo "$ERRORS" | jq '. | length')
          OVERALL_STATUS="completed"
          [ "$FAILED" -gt 0 ] && [ "$COMPLETED" -gt 0 ] && OVERALL_STATUS="partial"
          [ "$FAILED" -gt 0 ] && [ "$COMPLETED" -eq 0 ] && OVERALL_STATUS="error"
          jq -n --arg id "$REQUEST_ID" --arg status "$OVERALL_STATUS" --argjson results "$RESULTS" --argjson errors "$ERRORS" --argjson total "$((COMPLETED+FAILED))" --argjson succeeded "$COMPLETED" --argjson failed "$FAILED" '{request_id:$id,status:$status,results:$results,errors:$errors,summary:{total_urls:$total,succeeded:$succeeded,failed:$failed}}' > "${REQUEST_DIR}/result.json"
          echo "✅ Done: $COMPLETED ok, $FAILED failed"

      - name: "📬 Bale Notification"
        if: success() && github.event.inputs.bale_chat_id != ''
        env: { BALE_TOKEN: "${{ secrets.BALE_BOT_TOKEN }}" }
        run: |
          if [ -n "${{ github.event.inputs.bale_chat_id }}" ] && [ -n "$BALE_TOKEN" ]; then
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_TOKEN}/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\":\"${{ github.event.inputs.bale_chat_id }}\",\"text\":\"📸 *دانلود اینستاگرام شما آماده است\\!*\\n\\n🔗 [مشاهده فایل‌ها](https://github.com/khashayarone/khashayarone.github.io/tree/main/data/instagram-downloader/downloads/req_${{ env.REQUEST_ID }})\",\"parse_mode\":\"MarkdownV2\"}"
            echo "✅ Notification sent"
          fi

      - name: "📤 Commit & Push"
        if: always()
        run: |
          git add data/instagram-downloader/downloads/ 2>/dev/null || true
          find data/instagram-downloader/downloads/ -maxdepth 1 -type d -name "req_*" -mmin +1440 -exec rm -rf {} \; 2>/dev/null || true
          git add -u data/instagram-downloader/downloads/ 2>/dev/null || true
          if git diff --staged --quiet; then echo "No files"; else git commit -m "📸 IG DL [${{ env.REQUEST_ID }}] — $(date -u +'%H:%M UTC')" && git pull --rebase origin main 2>/dev/null || true && git push origin main 2>/dev/null || true && echo "✅ Committed"; fi
